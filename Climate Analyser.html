<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Analyser | Shrushti Taur</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00f2ff;
            --accent: #6c5ce7;
            --deep-dark: #050507;
            --glass: rgba(10, 10, 15, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--deep-dark);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* Added padding to ensure footer isn't touching screen edges on mobile */
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* Animated Aurora Background */
        .aurora {
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, var(--neon-pink), transparent 35%),
                        radial-gradient(circle at 80% 20%, var(--neon-blue), transparent 35%),
                        radial-gradient(circle at 20% 80%, var(--accent), transparent 35%);
            filter: blur(100px);
            opacity: 0.18;
            animation: rotate 25s linear infinite;
            z-index: -1;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .container {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 45px 35px;
            border-radius: 30px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            /* Slide up animation */
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(40px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Header Section Styles */
        .header-section {
            margin-bottom: 30px;
        }

        .shrushti-badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--neon-pink), var(--accent));
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.7rem;
            color: white;
            margin-bottom: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.25);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            margin-bottom: 5px;
            background: linear-gradient(to bottom, #ffffff, #b0b0b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 0.95rem;
            color: #999;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Main Image Styles */
        .preview-box {
            position: relative;
            border-radius: 18px;
            margin-bottom: 35px;
            padding: 4px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            overflow: hidden;
            transition: transform 0.4s ease;
        }

        .preview-img {
            width: 100%;
            border-radius: 14px;
            display: block;
            transition: 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .preview-box:hover .preview-img {
            transform: scale(1.03);
            filter: brightness(1.05);
        }

        /* Buttons Section */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: white;
            color: black;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            background: var(--neon-blue);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
        }

        .btn-outline {
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
        }

        .btn-outline:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.05);
            border-color: white;
        }

        /* Footer Section Styles - Fixed Clarity */
        .footer {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 25px;
            font-size: 0.75rem;
            color: #666;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .footer b { 
            color: #aaa; 
            font-weight: 700;
        }

        /* Responsive Fixes */
        @media (max-width: 480px) {
            .container { padding: 35px 25px; }
            .btn-group { flex-direction: column; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="aurora"></div>

    <div class="container">
        <!-- Header Section -->
        <div class="header-section">
            <div class="shrushti-badge">Dev Project // 2026</div>
            <h1>Climate Analyser</h1>
            <p class="tagline">Python Weather Intelligence</p>
        </div>
        
        <!-- App Screenshot -->
        <div class="preview-box">
            <img src="app-preview.png" alt="Climate Analyser Dashboard" class="preview-img">
        </div>

        <!-- Action Links -->
        <div class="btn-group">
            <a href="https://github.com/shrushti0305/Climate-Analyser" class="btn btn-primary">Source Code</a>
            <a href="https://github.com/shrushti0305/Climate-Analyser/archive/refs/heads/main.zip" class="btn btn-outline">Zip Download</a>
        </div>

        <!-- Footer Section -->
        <div class="footer">
            Built by <b>Shrushti Taur</b> // Pune, IN
        </div>
    </div>
</body>
</html>
